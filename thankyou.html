<!DOCTYPE html>
<html>
<head>
  <title>Thank You</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #dfe9f3, #ffffff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
    }

    a {
      text-decoration: none;
      background: #1a1a2e;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      display: inline-block;
    }

    a:hover {
      background: #333;
    }
  </style>

</head>

<body>

  <div class="box">
    <h1>Thank You!</h1>
    <p>Your form has been submitted successfully.</p>
    <p>We will contact you soon.</p>

    <a href="index.html">Go Back</a>
  </div>

</body>
</html>
